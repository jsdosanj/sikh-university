name = "sikh-university"
main = "worker.js"
compatibility_date = "2026-06-14"

# Custom domain. dosanjhlabs.com is in this (Jasvant Dosanjh) account, so on
# `wrangler deploy` Cloudflare provisions the DNS record + edge TLS cert
# automatically. SITE_URL stays unset so auth/magic-links follow the request
# origin — no other change needed.
routes = [
  { pattern = "sikh-university.dosanjhlabs.com", custom_domain = true }
]

# Build the Astro frontend (web/) before deploying; its output is the static site.
[build]
command = "cd web && npm install && npm run build && rm -f dist/assets/data/courses.json"

# Astro build output (web/dist) is served by the assets binding; the Worker handles /api/*.
[assets]
directory = "./web/dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "sikh-university"
database_id = "76977fdc-94aa-4088-9572-420d2a0ea329"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "sikh-university-media"

# Non-secret vars. SITE_URL is intentionally omitted so magic-link URLs derive
# from the request origin (works on workers.dev and any custom domain).
[vars]
ADMIN_EMAILS = "singhsxdhi@gmail.com,dots-whisks.6r@icloud.com,contact@sikhism.io"
MAIL_FROM = "Sikh University <login@dosanjhlabs.com>"
# RESEND_API_KEY is a secret — set in the dashboard (Settings > Variables and Secrets).
