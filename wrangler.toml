name = "sikh-university"
pages_build_output_dir = "site"
compatibility_date = "2026-06-14"

[[d1_databases]]
binding = "DB"
database_name = "sikh-university"
database_id = "76977fdc-94aa-4088-9572-420d2a0ea329"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "sikh-university-media"

# Non-secret vars deploy with the Git build (Pages reads wrangler.toml).
[vars]
SITE_URL = "https://sikh-university.pages.dev"
ADMIN_EMAILS = "singhsxdhi@gmail.com,contact@sikhism.io"
MAIL_FROM = "onboarding@resend.dev"
# RESEND_API_KEY is a secret — set in the Pages dashboard (you've added it).
